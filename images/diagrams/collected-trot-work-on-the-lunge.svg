  <line x1="200" y1="220" x2="314" y2="220" stroke="#6B6B6B" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="260" y="210" font-size="9" fill="#6B6B6B">lunge line</text>
  <text x="200" y="400" text-anchor="middle" font-size="10" fill="#1B2A4A">H = Handler position</text>
  <line x1="60" y1="440" x2="78" y2="440" stroke="#2D5A3D" stroke-width="2.5" stroke-dasharray="6,3"/>
