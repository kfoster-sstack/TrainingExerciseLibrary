  <circle cx="200" cy="220" r="160" fill="url(#sand)" stroke="#8B7D6B" stroke-width="2"/>
  <circle cx="200" cy="220" r="152" fill="none" stroke="#A0937D" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="200" cy="220" r="120" fill="none" stroke="#2D5A3D" stroke-width="3" stroke-dasharray="10,5" opacity="0.85"/>
  <path d="M 177.4,92.0 A 130,130 0 0,1 322.2,175.5" fill="none" stroke="#2D5A3D" stroke-width="2" marker-end="url(#ah)"/>
  <circle cx="200" cy="220" r="7" fill="#2980B9" opacity="0.8"/>
  <text x="200" y="223" text-anchor="middle" font-size="7" fill="white" font-weight="700">H</text>
